name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────
  # Job 1: PHP CodeSniffer (linting)
  # ──────────────────────────────────────────
  phpcs:
    name: PHP CodeSniffer (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, intl
          tools: composer, phpcs
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php-version }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHP CodeSniffer
        run: vendor/bin/phpcs --standard=phpcs.xml --report=full src/ tests/

  # ──────────────────────────────────────────
  # Job 2: PHPUnit (tests)
  # ──────────────────────────────────────────
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, intl
          tools: composer
          coverage: pcov   # usar PCOV (más rápido que Xdebug)

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php-version }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --configuration phpunit.xml --testdox

      - name: Upload coverage to Codecov
        # Solo subir cobertura en PHP 8.2 para evitar duplicados
        if: matrix.php-version == '8.2'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ──────────────────────────────────────────
  # Job 3: PHP CS Fixer (formato de código)
  # ──────────────────────────────────────────
  php-cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, php-cs-fixer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-8.2-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHP CS Fixer (dry-run)
        run: |
          # Comprueba si existe el fichero de config moderno (v3) o el legacy (v2)
          if [ -f ".php-cs-fixer.dist.php" ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.dist.php
          elif [ -f ".php_cs.dist" ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php_cs.dist
          else
            echo "No PHP CS Fixer config found, skipping."
          fi

  # ──────────────────────────────────────────
  # Job 4: Markdown Lint
  # ──────────────────────────────────────────
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.json
          globs: '**/*.md'